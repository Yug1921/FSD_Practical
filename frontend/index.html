<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Registration Portal</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1>Course Registration Portal</h1>
        <p>Register or log in to manage your courses</p>
      </div>

      <!-- Tab Switcher -->
      <div class="tab-switcher">
        <button class="tab-btn active" onclick="switchTab('login')">Login</button>
        <button class="tab-btn" onclick="switchTab('register')">Register</button>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="auth-form" novalidate>
        <div class="form-group">
          <label for="loginEmail">Email Address</label>
          <input type="email" id="loginEmail" placeholder="you@example.com" required />
          <span class="error-msg" id="loginEmailError"></span>
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" placeholder="Enter password" required />
          <span class="error-msg" id="loginPasswordError"></span>
        </div>
        <button type="submit" class="btn btn-primary btn-full">
          <span id="loginBtnText">Login</span>
        </button>
        <p id="loginError" class="form-error"></p>
      </form>

      <!-- Register Form -->
      <form id="registerForm" class="auth-form hidden" novalidate>
        <div class="form-group">
          <label for="regName">Full Name</label>
          <input type="text" id="regName" placeholder="John Doe" required />
          <span class="error-msg" id="regNameError"></span>
        </div>
        <div class="form-group">
          <label for="regEmail">Email Address</label>
          <input type="email" id="regEmail" placeholder="you@example.com" required />
          <span class="error-msg" id="regEmailError"></span>
        </div>
        <div class="form-group">
          <label for="regPassword">Password</label>
          <input type="password" id="regPassword" placeholder="Min. 6 characters" required />
          <span class="error-msg" id="regPasswordError"></span>
        </div>
        <div class="form-group">
          <label for="regConfirm">Confirm Password</label>
          <input type="password" id="regConfirm" placeholder="Repeat password" required />
          <span class="error-msg" id="regConfirmError"></span>
        </div>
        <button type="submit" class="btn btn-primary btn-full">
          <span id="registerBtnText">Create Account</span>
        </button>
        <p id="registerError" class="form-error"></p>
        <p id="registerSuccess" class="form-success"></p>
      </form>
    </div>
  </div>

  <script src="javascript/auth.js"></script>
</body>
</html>
